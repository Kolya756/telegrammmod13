name: CI

on:
  # push:
  #   branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Build the App
        run: |
          set -x

          # source code paths are included in the final binary, so we need to make them stable across builds
          SOURCE_DIR=/Users/Shared/telegram-ios

          # use canonical bazel root
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

          # collect ipa (bazel target "Swiftgram" -> Swiftgram.ipa, resolve via stable bazel-bin symlink)
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          IPA_PATH=$(find -L bazel-bin/Telegram bazel-out -maxdepth 6 -name Swiftgram.ipa -type f 2>/dev/null | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "Could not locate Swiftgram.ipa in bazel outputs"; exit 1
          fi
          echo "Found IPA at $IPA_PATH"
          cp "$IPA_PATH" "$OUTPUT_PATH/Symonagram.ipa"

          # collect dsyms (dedupe by basename — bazel exposes same dSYM under runfiles/ too)
          mkdir -p build/DSYMs
          set +e
          declare -A SEEN
          while IFS= read -r d; do
            [ -z "$d" ] && continue
            name=$(basename "$d")
            [ -n "${SEEN[$name]}" ] && continue
            SEEN[$name]=1
            cp -R "$d" "build/DSYMs/$name" && chmod -R u+w "build/DSYMs/$name"
          done < <(find -L bazel-bin/Telegram bazel-out -maxdepth 6 -name "*.dSYM" -type d 2>/dev/null | grep -v /runfiles/)
          set -e
          zip -r "./$OUTPUT_PATH/Symonagram.DSYMs.zip" build/DSYMs 1>/dev/null || echo "dSYM zip failed, continuing"

      - name: Upload build artifacts (fallback if release step fails)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Symonagram-${{ env.BUILD_NUMBER }}
          path: |
            /Users/Shared/telegram-ios/build/artifacts/Symonagram.ipa
            /Users/Shared/telegram-ios/build/artifacts/Symonagram.DSYMs.zip
          if-no-files-found: warn
          retention-days: 30
          # IPA + dSYMs are delivered via this artifact upload. The old
          # actions/create-release steps were removed: GITHUB_TOKEN has no
          # release-write permission here, so they always failed and marked the
          # whole run red even though the build + artifact succeeded.
